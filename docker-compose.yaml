name: kanboard
services:
  app:
    image: ${KANBOARD_IMAGE:-kanboard/kanboard:latest}
    container_name: kanboard
    restart: always
    ports:
     - "80:80"
     # - "443:443"
    volumes:
     - data:/var/www/app/data
     - plugins:/var/www/app/plugins
     # - certs:/etc/nginx/ssl
    environment:
     - PLUGIN_INSTALLER=true # Swap to true to enable web based plugin installation
volumes:
  data:
    driver: local
  plugins:
    driver: local
  # certs:
  #  driver: local